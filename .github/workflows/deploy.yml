name: Deploy to Locaweb (FTP)

# Publica em semantica.benearagao.com.br via FTP, mas SÓ depois que a
# auditoria de acessibilidade (WCAG 2.2 AA) passar. Pull requests rodam
# apenas a auditoria (sem deploy).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    name: Auditoria de acessibilidade (WCAG 2.2 AA)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependências de teste
        working-directory: tests
        run: npm ci

      - name: Instalar Chromium (Playwright)
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Servir o site estático (raiz do repositório)
        run: |
          python3 -m http.server 4321 --directory . &
          npx --yes wait-on http://localhost:4321/

      - name: Rodar suite (HTML + teclado + axe-core)
        working-directory: tests
        env:
          BASE_URL: http://localhost:4321/
        run: npm test

  deploy:
    name: FTP Upload para o subdomínio
    runs-on: ubuntu-latest
    needs: audit
    if: github.event_name != 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.benearagao.com.br
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Sobe a raiz do repositório, mas exclui tudo que não é o site.
          local-dir: ./
          # Pasta do subdomínio na Locaweb — confirme o caminho no painel.
          server-dir: /public_html/semantica/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/tests/**
            **/docs/**
            **/.claude/**
            **/*.md
            **/.gitignore
            **/.htmlvalidate.json
            **/LICENSE
            **/.DS_Store
          log-level: standard
